        body {

            background: #0a0a0a;
            color: #fff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            user-select: none;
        }
        .header {
            background: linear-gradient(135deg, #1a1a2e, #16213e);
            padding: 10px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid #e50914;
            flex-wrap: wrap;
            gap: 6px;
            z-index: 10;
        }
        .header h1 {
            font-size: 18px;
            font-weight: 700;
            background: linear-gradient(90deg, #e50914, #ff6b6b);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .header h1 i { -webkit-text-fill-color: #e50914; font-size: 20px; }
        .header .info {
            font-size: 10px;
            color: #888;
            display: flex;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
        }
        .header .info .dot {
            width: 6px; height: 6px;
            background: #4caf50;
            border-radius: 50%;
            display: inline-block;
            animation: pulse 1.5s infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.3; transform: scale(0.8); }
        }
        .header .info span { color: #4caf50; }
        .header .info .istatistik { color: #666; font-size: 9px; }
        
        .player-wrapper {
            position: relative;
            background: #000;
            width: 100%;
            aspect-ratio: 16/9;
            max-height: 65vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        #video {
            width: 100%;
            height: 100%;
            background: #000;
            outline: none;
        }
        #video::-webkit-media-controls { display: none !important; }
        #video::-webkit-media-controls-enclosure { display: none !important; }
        
        .custom-controls {
            position: absolute;
            bottom: 0; left: 0; right: 0;
            background: linear-gradient(transparent, rgba(0,0,0,0.85));
            padding: 15px 12px 10px;
            opacity: 0;
            transition: opacity 0.4s ease;
            display: flex;
            flex-direction: column;
            gap: 4px;
        }
        .player-wrapper:hover .custom-controls,
        .player-wrapper.show-controls .custom-controls { opacity: 1; }
        .custom-controls .top-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 8px;
        }
        .custom-controls .top-row .channel-name {
            font-size: 13px;
            font-weight: 600;
            color: #fff;
            text-shadow: 0 2px 8px rgba(0,0,0,0.8);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 55%;
        }
        .custom-controls .top-row .time-display {
            font-size: 11px;
            color: #ccc;
            text-shadow: 0 2px 8px rgba(0,0,0,0.8);
        }
        .custom-controls .bottom-row {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .custom-controls .bottom-row button {
            background: none;
            border: none;
            color: #fff;
            font-size: 18px;
            cursor: pointer;
            padding: 3px 5px;
            border-radius: 4px;
            transition: 0.2s;
            text-shadow: 0 2px 8px rgba(0,0,0,0.8);
            display: flex;
            align-items: center;
            justify-content: center;
            min-width: 28px;
        }
        .custom-controls .bottom-row button:hover { color: #e50914; transform: scale(1.1); }
        .custom-controls .bottom-row button.play-btn { font-size: 24px; }
        .custom-controls .bottom-row .progress-container {
            flex: 1;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .custom-controls .bottom-row .progress-container input[type="range"] {
            flex: 1;
            -webkit-appearance: none;
            appearance: none;
            height: 3px;
            background: rgba(255,255,255,0.3);
            border-radius: 2px;
            outline: none;
            cursor: pointer;
            transition: 0.2s;
        }
        .custom-controls .bottom-row .progress-container input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 12px; height: 12px;
            border-radius: 50%;
            background: #e50914;
            cursor: pointer;
            border: 2px solid #fff;
            box-shadow: 0 2px 8px rgba(0,0,0,0.5);
        }
        .custom-controls .bottom-row .progress-container input[type="range"]::-moz-range-thumb {
            width: 12px; height: 12px;
            border-radius: 50%;
            background: #e50914;
            cursor: pointer;
            border: 2px solid #fff;
        }
        .custom-controls .bottom-row .progress-container .time-label {
            font-size: 11px;
            color: #ccc;
            min-width: 40px;
            text-shadow: 0 2px 8px rgba(0,0,0,0.8);
        }
        .custom-controls .bottom-row .volume-container {
            display: flex;
            align-items: center;
            gap: 4px;
        }
        .custom-controls .bottom-row .volume-container button { font-size: 16px; min-width: 24px; }
        .custom-controls .bottom-row .volume-container input[type="range"] {
            width: 50px;
            -webkit-appearance: none;
            appearance: none;
            height: 3px;
            background: rgba(255,255,255,0.3);
            border-radius: 2px;
            outline: none;
            cursor: pointer;
        }
        .custom-controls .bottom-row .volume-container input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 10px; height: 10px;
            border-radius: 50%;
            background: #e50914;
            cursor: pointer;
            border: 2px solid #fff;
        }
        .custom-controls .bottom-row .fullscreen-btn { font-size: 16px; }
        
        .channel-bar {
            background: #1a1a2e;
            padding: 8px 12px;
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 8px;
            border-bottom: 1px solid #333;
        }
        .channel-bar select {
            flex: 1;
            min-width: 140px;
            padding: 6px 10px;
            background: #2a2a4a;
            color: #fff;
            border: 1px solid #444;
            border-radius: 5px;
            font-size: 12px;
            cursor: pointer;
            outline: none;
        }
        .channel-bar select:focus { border-color: #e50914; }
        .channel-bar button {
            padding: 6px 14px;
            background: #e50914;
            color: #fff;
            border: none;
            border-radius: 5px;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
            display: flex;
            align-items: center;
            gap: 5px;
        }
        .channel-bar button:hover { background: #ff0a1a; transform: scale(1.02); }
        .channel-bar .status {
            font-size: 11px;
            color: #aaa;
            margin-left: auto;
            white-space: nowrap;
        }
        .channel-bar .status .live {
            color: #e50914;
            font-weight: 700;
            animation: blink 1s infinite;
        }
        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.2; }
        }
        
        .kategori-bar {
            background: #111;
            padding: 6px 12px;
            display: flex;
            flex-wrap: wrap;
            gap: 4px;
            border-bottom: 1px solid #222;
            overflow-x: auto;
        }
        .kategori-bar .kat-btn {
            padding: 3px 10px;
            background: #1a1a2e;
            color: #888;
            border: 1px solid #333;
            border-radius: 16px;
            font-size: 10px;
            cursor: pointer;
            transition: 0.2s;
            white-space: nowrap;
        }
        .kategori-bar .kat-btn:hover {
            background: #2a2a4a;
            color: #fff;
        }
        .kategori-bar .kat-btn.active {
            background: #e50914;
            color: #fff;
            border-color: #e50914;
        }
        
        .channel-list-container {
            background: #111;
            padding: 10px 12px;
            flex: 1;
            overflow-y: auto;
            max-height: 35vh;
            border-top: 1px solid #222;
        }
        .channel-list-container .list-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
            border-bottom: 1px solid #333;
            padding-bottom: 6px;
        }
        .channel-list-container .list-header h3 {
            color: #e50914;
            font-size: 13px;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .channel-list-container .list-header .channel-count {
            font-size: 10px;
            color: #666;
            font-weight: 400;
        }
        .channel-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
            padding: 6px 10px;
            margin-bottom: 3px;
            background: #1a1a2e;
            border-radius: 5px;
            border-left: 3px solid #444;
            cursor: pointer;
            transition: 0.2s;
        }
        .channel-item:hover { background: #2a2a4a; transform: translateX(3px); }
        .channel-item.active { border-left-color: #e50914; background: #2a1a2e; }
        .channel-item .info {
            flex: 1;
            min-width: 0;
        }
        .channel-item .info .title {
            font-size: 12px;
            font-weight: 600;
            color: #fff;
        }
        .channel-item .info .category {
            font-size: 9px;
            color: #666;
            margin-top: 1px;
        }
        .channel-item .play-btn {
            padding: 3px 12px;
            background: #e50914;
            color: #fff;
            border: none;
            border-radius: 3px;
            font-size: 10px;
            cursor: pointer;
            flex-shrink: 0;
            transition: 0.2s;
        }
        .channel-item .play-btn:hover { background: #ff0a1a; transform: scale(1.05); }
        .no-channel { color: #666; text-align: center; padding: 15px; font-size: 12px; }
        
        .loading-overlay {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: rgba(0,0,0,0.7);
            z-index: 5;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.4s;
        }
        .loading-overlay.show { opacity: 1; pointer-events: auto; }
        .loading-overlay .spinner {
            width: 40px; height: 40px;
            border: 3px solid #333;
            border-top-color: #e50914;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        .loading-overlay .loading-text { color: #aaa; font-size: 12px; margin-top: 10px; }
        @keyframes spin { to { transform: rotate(360deg); } }
        
        .error-overlay {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: rgba(0,0,0,0.8);
            z-index: 6;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.4s;

        .error-overlay.show { opacity: 1; pointer-events: auto; }
        .error-overlay i { font-size: 36px; color: #e50914; }
        .error-overlay .error-text { color: #fff; font-size: 14px; margin-top: 10px; }
        .error-overlay .error-sub { color: #888; font-size: 11px; margin-top: 3px; }
        
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: #1a1a2e; }
        ::-webkit-scrollbar-thumb { background: #444; border-radius: 2px; }

        @media (max-width: 600px) {

            .channel-bar button { padding: 5px 10px; font-size: 11px; }
            .channel-bar .status { font-size: 9px; }

            .custom-controls .bottom-row button.play-btn { font-size: 18px; }
            .custom-controls .bottom-row .volume-container input[type="range"] { width: 35px; }
            .custom-controls .top-row .channel-name { font-size: 11px; max-width: 45%; }
            .channel-item { padding: 5px 8px; gap: 6px; }
            .channel-item .info .title { font-size: 11px; }
            .channel-item .play-btn { font-size: 9px; padding: 2px 10px; }
            .channel-list-container .list-header h3 { font-size: 12px; }
            .player-wrapper { aspect-ratio: 16/9; max-height: 45vh; }
            .kategori-bar .kat-btn { font-size: 9px; padding: 2px 8px; }

        }
        @media (max-width: 400px) {
            .header h1 { font-size: 13px; }

            .channel-bar button { padding: 4px 8px; font-size: 10px; }
            .custom-controls .bottom-row button { font-size: 12px; min-width: 20px; }
            .custom-controls .bottom-row button.play-btn { font-size: 16px; }
            .custom-controls .bottom-row .volume-container input[type="range"] { width: 25px; }
        }
    </style>

<body>
    <div class="header">
        <h1><i class="fas fa-tv"></i> Mutlu TV</h1>
        <div class="info">
            <span class="dot"></span>
            <span id="channelCount">0</span> kanal
            <span>•</span>
            <span id="totalCount">35</span> toplam
            <span class="istatistik">| 🔑 35 · 🌐 0 · ❌ 97</span>
            <span>•</span>
            <i class="far fa-clock"></i> <span id="updateTime">20.07.2026 14:27</span>
        </div>
    </div>

    <div class="player-wrapper" id="playerWrapper">
        <video id="video" playsinline></video>
        <div class="loading-overlay" id="loadingOverlay">
            <div class="spinner"></div>
            <div class="loading-text">Yayın bağlanıyor...</div>
        </div>
        <div class="error-overlay" id="errorOverlay">
            <i class="fas fa-exclamation-triangle"></i>
            <div class="error-text">Yayın hatası!</div>
            <div class="error-sub">Lütfen başka bir kanal deneyin</div>
        </div>
        <div class="custom-controls" id="customControls">
            <div class="top-row">
                <span class="channel-name" id="channelNameDisplay">Kanal Seçiniz</span>
                <span class="time-display" id="timeDisplay">00:00 / 00:00</span>
            </div>
            <div class="bottom-row">
                <button class="play-btn" id="playBtn" title="Oynat/Duraklat">
                    <i class="fas fa-play"></i>
                </button>
                <div class="progress-container">
                    <span class="time-label" id="currentTimeLabel">00:00</span>
                    <input type="range" id="progressBar" value="0" min="0" max="100" step="0.1">
                    <span class="time-label" id="durationLabel">00:00</span>
                </div>
                <div class="volume-container">
                    <button id="muteBtn" title="Ses">
                        <i class="fas fa-volume-up"></i>
                    </button>
                    <input type="range" id="volumeBar" value="100" min="0" max="100" step="1">
                </div>
                <button class="fullscreen-btn" id="fullscreenBtn" title="Tam Ekran">
                    <i class="fas fa-expand"></i>
                </button>
            </div>
        </div>
    </div>

    <div class="channel-bar">
        <select id="channelSelect">
            <option value="">📡 Kanal Seç</option>
        </select>
        <button id="reloadBtn"><i class="fas fa-sync-alt"></i> Yenile</button>
        <span class="status" id="statusText">⏳ Hazırlanıyor...</span>
    </div>

    <div class="kategori-bar" id="kategoriBar">
        <button class="kat-btn active" data-kat="TÜMÜ">TÜMÜ (35)</button>
        <button class="kat-btn" data-kat="DİĞER">DİĞER (5)</button> <button class="kat-btn" data-kat="HABER">HABER (6)</button> <button class="kat-btn" data-kat="SPOR">SPOR (1)</button> <button class="kat-btn" data-kat="ULUSAL">ULUSAL (19)</button> <button class="kat-btn" data-kat="YEREL">YEREL (4)</button> 
    </div>

    <div class="channel-list-container" id="channelContainer">
        <div class="list-header">
            <h3><i class="fas fa-list-ul"></i> Kanallar</h3>
            <span class="channel-count" id="channelCountDisplay">0 kanal</span>
        </div>
        <div id="channelList">
            <div class="no-channel">📋 Kanal seçiniz.</div>
        </div>
    </div>

/index.m3u8?token=f89495a0f5d69ffc1d4e887d07defe71"}, {"id": "442", "name": "TRT Spor Yildiz (Turkey)", "kategori": "ULUSAL", "url": "https://trn03.tulix.tv/gt-trt-spor2/index.m3u8?token=f89495a0f5d69ffc1d4e887d07defe71"}, {"id": "356", "name": "TRT Turk (Turkey)", "kategori": "ULUSAL", "url": "https://trn03.tulix.tv/gt-trtturk/index.m3u8?token=f89495a0f5d69ffc1d4e887d07defe71"}, {"id": "788", "name": "TRT World (Turkey)", "kategori": "ULUSAL", "url": "https://trn03.tulix.tv/gt-trtworld/index.m3u8?token=f89495a0f5d69ffc1d4e887d07defe71"}, {"id": "977", "name": "TRT1 - HD (Turkey)", "kategori": "ULUSAL", "url": "https://trn03.tulix.tv/gt-trt1/index.m3u8?token=f89495a0f5d69ffc1d4e887d07defe71"}, {"id": "425", "name": "TV100 (Turkey)", "kategori": "ULUSAL", "url": "https://trn03.tulix.tv/gt-tv100/index.m3u8?token=f89495a0f5d69ffc1d4e887d07defe71"}, {"id": "937", "name": "TV8 (Turkey)", "kategori": "ULUSAL", "url": "https://trn03.tulix.tv/tv8-hd-tv/index.m3u8?token=f89495a0f5d69ffc1d4e887d07defe71"}, {"id": "459", "name": "TV8 Int (Turkey)", "kategori": "ULUSAL", "url": "https://trn03.tulix.tv/gt-tv8international/index.m3u8?token=f89495a0f5d69ffc1d4e887d07defe71"}, {"id": "953", "name": "TV8.5 (Turkey)", "kategori": "ULUSAL", "url": "https://trn03.tulix.tv/gt-tv8_5/index.m3u8?token=f89495a0f5d69ffc1d4e887d07defe71"}, {"id": "829", "name": "beIN Sports Haber (Turkey)", "kategori": "HABER", "url": "https://trn03.tulix.tv/gt-beinsportshaber/index.m3u8?token=f89495a0f5d69ffc1d4e887d07defe71"}, {"id": "138", "name": "teve 2 (Turkey)", "kategori": "DİĞER", "url": "https://trn03.tulix.tv/gt-teve2/index.m3u8?token=f89495a0f5d69ffc1d4e887d07defe71"}];
        let currentChannel = null;
        let hls = null;
        let isPlaying = false;
        let isDragging = false;
        let aktifKategori = 'TÜMÜ';

        const video = document.getElementById('video');
        const channelSelect = document.getElementById('channelSelect');
        const channelList = document.getElementById('channelList');
        const statusText = document.getElementById('statusText');
        const reloadBtn = document.getElementById('reloadBtn');
        const channelCount = document.getElementById('channelCount');
        const totalCount = document.getElementById('totalCount');
        const updateTime = document.getElementById('updateTime');
        const channelCountDisplay = document.getElementById('channelCountDisplay');
        const channelNameDisplay = document.getElementById('channelNameDisplay');
        const timeDisplay = document.getElementById('timeDisplay');
        const currentTimeLabel = document.getElementById('currentTimeLabel');
        const durationLabel = document.getElementById('durationLabel');
        const progressBar = document.getElementById('progressBar');
        const volumeBar = document.getElementById('volumeBar');
        const playBtn = document.getElementById('playBtn');
        const muteBtn = document.getElementById('muteBtn');
        const fullscreenBtn = document.getElementById('fullscreenBtn');
        const loadingOverlay = document.getElementById('loadingOverlay');
        const errorOverlay = document.getElementById('errorOverlay');
        const playerWrapper = document.getElementById('playerWrapper');

        function populateChannels() {
            channelCount.textContent = KANALLAR.length;
            totalCount.textContent = '35';
            updateTime.textContent = '20.07.2026 14:27';
            
            channelSelect.innerHTML = '<option value="">📡 Kanal Seç</option>';
            KANALLAR.forEach(k => {
                const opt = document.createElement('option');
                opt.value = k.id;
                opt.dataset.kat = k.kategori || 'DİĞER';
                opt.textContent = k.name;
                channelSelect.appendChild(opt);
            });
            
            renderChannelList(KANALLAR);
            statusText.textContent = '✅ Kanal seçiniz';
            console.log(`${KANALLAR.length} kanal yüklendi.`);
        }

        function renderChannelList(kanallar) {
            if (!kanallar || kanallar.length === 0) {
                channelList.innerHTML = `<div class="no-channel">📋 Kanal bulunamadı.</div>`;
                channelCountDisplay.textContent = '0 kanal';
                return;
            }
            
            let html = '';
            kanallar.forEach((item) => {
                const activeClass = (currentChannel && currentChannel.id === item.id) ? 'active' : '';
                const kategori = item.kategori || 'DİĞER';
                html += `
                    <div class="channel-item ${activeClass}" data-id="${item.id}">
                        <div class="info">
                            <div class="title">${item.name}</div>
                            <div class="category">${kategori}</div>
                        </div>
                        <button class="play-btn" data-id="${item.id}" data-url="${item.url}">
                            <i class="fas fa-play"></i> Oynat
                        </button>
                    </div>
                `;
            });
            
            channelList.innerHTML = html;
            channelCountDisplay.textContent = `${kanallar.length} kanal`;
            
            document.querySelectorAll('.channel-item .play-btn').forEach(btn => {
                btn.addEventListener('click', function(e) {
                    e.stopPropagation();
                    const id = this.dataset.id;
                    const url = this.dataset.url;
                    if (url) {
                        const kanal = KANALLAR.find(k => k.id === id);
                        if (kanal) {
                            loadChannel(kanal, url);
                        }
                    }
                });
            });
            
            document.querySelectorAll('.channel-item').forEach(el => {
                el.addEventListener('click', function() {
                    const id = this.dataset.id;
                    const kanal = KANALLAR.find(k => k.id === id);
                    if (kanal && kanal.url) {
                        loadChannel(kanal, kanal.url);
                    }
                });
            });
        }

        function kanalFiltrele(kategori) {
            aktifKategori = kategori;
            
            document.querySelectorAll('.kat-btn').forEach(btn => {
                btn.classList.toggle('active', btn.dataset.kat === kategori);
            });
            
            let filtrelenmis = [];
            if (kategori === 'TÜMÜ') {
                filtrelenmis = KANALLAR;
            } else {
                filtrelenmis = KANALLAR.filter(k => (k.kategori || 'DİĞER') === kategori);
            }
            
            renderChannelList(filtrelenmis);
            
            const options = channelSelect.querySelectorAll('option');
            options.forEach(opt => {
                if (opt.value === '') return;
                const kat = opt.dataset.kat || 'DİĞER';
                if (kategori === 'TÜMÜ' || kat === kategori) {
                    opt.style.display = '';
                } else {
                    opt.style.display = 'none';
                }
            });
            
            const secili = channelSelect.value;
            if (secili) {
                const seciliOpt = channelSelect.querySelector(`option[value="${secili}"]`);
                if (!seciliOpt || seciliOpt.style.display === 'none') {
                    channelSelect.value = '';
                    video.pause();
                    video.src = '';
                    statusText.textContent = '✅ Kanal seçiniz';
                    channelNameDisplay.textContent = 'Kanal Seçiniz';
                }
            }
        }

        document.querySelectorAll('.kat-btn').forEach(btn => {
            btn.addEventListener('click', function() {
                kanalFiltrele(this.dataset.kat);
            });
        });

        function loadChannel(kanal, url) {
            if (!url) {
                statusText.textContent = '❌ Bu kanal için yayın linki yok!';
                return;
            }
            
            currentChannel = kanal;
            channelNameDisplay.textContent = kanal.name;
            statusText.innerHTML = `🔴 <span class="live">CANLI</span> ${kanal.name}`;
            
            document.querySelectorAll('.channel-item').forEach(el => {
                el.classList.toggle('active', el.dataset.id === kanal.id);
            });
            
            channelSelect.value = kanal.id;
            playVideo(url);
        }

        function playVideo(url) {
            if (hls) {
                hls.destroy();
                hls = null;
            }
            
            showLoading(true);
            hideError();
            
            if (Hls.isSupported()) {
                hls = new Hls({
                    enableWorker: true,
                    lowLatencyMode: true,
                    maxBufferLength: 10,
                    xhrSetup: function(xhr, url) {
                        xhr.withCredentials = false;
                    }
                });
                hls.loadSource(url);
                hls.attachMedia(video);
                hls.on(Hls.Events.MANIFEST_PARSED, function() {
                    video.play().catch(e => {
                        console.log('Otomatik oynatma engellendi:', e);
                    });
                    isPlaying = true;
                    updatePlayButton();
                    showLoading(false);
                });
                hls.on(Hls.Events.ERROR, function(event, data) {
                    if (data.fatal) {
                        console.error('HLS hatası:', data);
                        showError('Yayın hatası!');
                        statusText.textContent = '❌ Yayın hatası!';
                        showLoading(false);
                    }
                });
            } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
                video.src = url;
                video.play().catch(e => {
                    console.log('Otomatik oynatma engellendi:', e);
                });
                isPlaying = true;
                updatePlayButton();
                showLoading(false);
            } else {
                statusText.textContent = '❌ Tarayıcınız HLS desteklemiyor.';
                showError('HLS desteklenmiyor');
                showLoading(false);
            }
        }

        function updatePlayButton() {
            const icon = playBtn.querySelector('i');
            if (video.paused) {
                icon.className = 'fas fa-play';
                isPlaying = false;
            } else {
                icon.className = 'fas fa-pause';
                isPlaying = true;
            }
        }

        function updateProgress() {
            if (!isDragging) {
                const percent = (video.currentTime / video.duration) * 100;
                progressBar.value = percent || 0;
                currentTimeLabel.textContent = formatTime(video.currentTime);
                durationLabel.textContent = formatTime(video.duration);
                timeDisplay.textContent = `${formatTime(video.currentTime)} / ${formatTime(video.duration)}`;
            }
        }

        function formatTime(seconds) {
            if (!seconds || isNaN(seconds)) return '00:00';
            const s = Math.floor(seconds);
            const m = Math.floor(s / 60);
            const sec = s % 60;
            return `${String(m).padStart(2, '0')}:${String(sec).padStart(2, '0')}`;
        }

        function showLoading(show) {
            loadingOverlay.classList.toggle('show', show);
        }

        function showError(msg) {
            errorOverlay.classList.add('show');
            document.querySelector('.error-text').textContent = msg || 'Yayın hatası!';
        }

        function hideError() {
            errorOverlay.classList.remove('show');
        }

        function updateMuteIcon() {
            const icon = muteBtn.querySelector('i');
            if (video.muted || video.volume === 0) {
                icon.className = 'fas fa-volume-mute';
            } else if (video.volume < 0.5) {
                icon.className = 'fas fa-volume-down';
            } else {
                icon.className = 'fas fa-volume-up';
            }
        }

        channelSelect.addEventListener('change', function() {
            const id = this.value;
            if (id) {
                const kanal = KANALLAR.find(k => k.id === id);
                if (kanal && kanal.url) {
                    loadChannel(kanal, kanal.url);
                }
            } else {
                video.pause();
                video.src = '';
                statusText.textContent = '✅ Kanal seçiniz';
                channelNameDisplay.textContent = 'Kanal Seçiniz';
                document.querySelectorAll('.channel-item').forEach(el => el.classList.remove('active'));
            }
        });

        reloadBtn.addEventListener('click', function() {
            const id = channelSelect.value;
            if (id) {
                const kanal = KANALLAR.find(k => k.id === id);
                if (kanal && kanal.url) {
                    loadChannel(kanal, kanal.url);
                }
            }
        });

        playBtn.addEventListener('click', function() {
            if (video.paused) {
                video.play().catch(e => console.log('Oynatma hatası:', e));
            } else {
                video.pause();
            }
            updatePlayButton();
        });

        video.addEventListener('play', updatePlayButton);
        video.addEventListener('pause', updatePlayButton);
        video.addEventListener('timeupdate', updateProgress);
        video.addEventListener('loadedmetadata', updateProgress);
        video.addEventListener('waiting', () => showLoading(true));
        video.addEventListener('canplay', () => showLoading(false));
        video.addEventListener('error', () => {
            showError('Video hatası!');
            showLoading(false);
        });

        progressBar.addEventListener('input', function() {
            isDragging = true;
            const percent = parseFloat(this.value);
            const time = (percent / 100) * video.duration;
            currentTimeLabel.textContent = formatTime(time);
            timeDisplay.textContent = `${formatTime(time)} / ${formatTime(video.duration)}`;
        });
        progressBar.addEventListener('change', function() {
            isDragging = false;
            const percent = parseFloat(this.value);
            const time = (percent / 100) * video.duration;
            video.currentTime = time;
        });

        volumeBar.addEventListener('input', function() {
            const vol = parseFloat(this.value) / 100;
            video.volume = vol;
            updateMuteIcon();
        });

        muteBtn.addEventListener('click', function() {
            video.muted = !video.muted;
            updateMuteIcon();
        });

        fullscreenBtn.addEventListener('click', function() {
            if (!document.fullscreenElement) {
                playerWrapper.requestFullscreen?.() || 
                playerWrapper.webkitRequestFullscreen?.();
            } else {
                document.exitFullscreen?.() || 
                document.webkitExitFullscreen?.();
            }
        });

        let controlsTimeout;
        playerWrapper.addEventListener('mousemove', function() {
            playerWrapper.classList.add('show-controls');
            clearTimeout(controlsTimeout);
            controlsTimeout = setTimeout(() => {
                if (!video.paused) {
                    playerWrapper.classList.remove('show-controls');
                }
            }, 3000);
        });
        playerWrapper.addEventListener('mouseleave', function() {
            if (!video.paused) {
                playerWrapper.classList.remove('show-controls');
            }
        });
        playerWrapper.addEventListener('touchstart', function() {
            playerWrapper.classList.toggle('show-controls');
        });

        document.addEventListener('keydown', function(e) {
            if (e.target.tagName === 'SELECT') return;
            if (e.code === 'Space') {
                e.preventDefault();
                playBtn.click();
            }
            if (e.code === 'ArrowRight') {
                video.currentTime = Math.min(video.currentTime + 10, video.duration);
            }
            if (e.code === 'ArrowLeft') {
                video.currentTime = Math.max(video.currentTime - 10, 0);
            }
            if (e.code === 'KeyF') {
                fullscreenBtn.click();
            }
        });

        populateChannels();
        console.log('📺 Mutlu TV başlatıldı!');
        console.log(`📡 ${KANALLAR.length} kanal hazır.`);
    </script>
</body>
