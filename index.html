<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mutlu TV - Canlı Yayın</title>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #0a0a0a;
            color: #fff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            user-select: none;
        }
        .header {
            background: linear-gradient(135deg, #1a1a2e, #16213e);
            padding: 12px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid #e50914;
            flex-wrap: wrap;
            gap: 8px;
            z-index: 10;
        }
        .header h1 {
            font-size: 20px;
            font-weight: 700;
            background: linear-gradient(90deg, #e50914, #ff6b6b);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .header h1 i { -webkit-text-fill-color: #e50914; font-size: 22px; }
        .header .info {
            font-size: 11px;
            color: #888;
            display: flex;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
        }
        .header .info .dot {
            width: 8px; height: 8px;
            background: #4caf50;
            border-radius: 50%;
            display: inline-block;
            animation: pulse 1.5s infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.3; transform: scale(0.8); }
        }
        .header .info span { color: #4caf50; }
        
        .player-wrapper {
            position: relative;
            background: #000;
            width: 100%;
            aspect-ratio: 16/9;
            max-height: 70vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        #video {
            width: 100%;
            height: 100%;
            background: #000;
            outline: none;
        }
        #video::-webkit-media-controls { display: none !important; }
        #video::-webkit-media-controls-enclosure { display: none !important; }
        
        .custom-controls {
            position: absolute;
            bottom: 0; left: 0; right: 0;
            background: linear-gradient(transparent, rgba(0,0,0,0.85));
            padding: 20px 15px 12px;
            opacity: 0;
            transition: opacity 0.4s ease;
            display: flex;
            flex-direction: column;
            gap: 6px;
        }
        .player-wrapper:hover .custom-controls,
        .player-wrapper.show-controls .custom-controls { opacity: 1; }
        .custom-controls .top-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
        }
        .custom-controls .top-row .channel-name {
            font-size: 14px;
            font-weight: 600;
            color: #fff;
            text-shadow: 0 2px 8px rgba(0,0,0,0.8);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 60%;
        }
        .custom-controls .top-row .time-display {
            font-size: 12px;
            color: #ccc;
            text-shadow: 0 2px 8px rgba(0,0,0,0.8);
        }
        .custom-controls .bottom-row {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .custom-controls .bottom-row button {
            background: none;
            border: none;
            color: #fff;
            font-size: 20px;
            cursor: pointer;
            padding: 4px 6px;
            border-radius: 4px;
            transition: 0.2s;
            text-shadow: 0 2px 8px rgba(0,0,0,0.8);
            display: flex;
            align-items: center;
            justify-content: center;
            min-width: 32px;
        }
        .custom-controls .bottom-row button:hover { color: #e50914; transform: scale(1.1); }
        .custom-controls .bottom-row button.play-btn { font-size: 28px; }
        .custom-controls .bottom-row .progress-container {
            flex: 1;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .custom-controls .bottom-row .progress-container input[type="range"] {
            flex: 1;
            -webkit-appearance: none;
            appearance: none;
            height: 4px;
            background: rgba(255,255,255,0.3);
            border-radius: 2px;
            outline: none;
            cursor: pointer;
            transition: 0.2s;
        }
        .custom-controls .bottom-row .progress-container input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 14px; height: 14px;
            border-radius: 50%;
            background: #e50914;
            cursor: pointer;
            border: 2px solid #fff;
            box-shadow: 0 2px 8px rgba(0,0,0,0.5);
        }
        .custom-controls .bottom-row .progress-container input[type="range"]::-moz-range-thumb {
            width: 14px; height: 14px;
            border-radius: 50%;
            background: #e50914;
            cursor: pointer;
            border: 2px solid #fff;
        }
        .custom-controls .bottom-row .progress-container .time-label {
            font-size: 12px;
            color: #ccc;
            min-width: 50px;
            text-shadow: 0 2px 8px rgba(0,0,0,0.8);
        }
        .custom-controls .bottom-row .volume-container {
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .custom-controls .bottom-row .volume-container button { font-size: 18px; min-width: 28px; }
        .custom-controls .bottom-row .volume-container input[type="range"] {
            width: 60px;
            -webkit-appearance: none;
            appearance: none;
            height: 3px;
            background: rgba(255,255,255,0.3);
            border-radius: 2px;
            outline: none;
            cursor: pointer;
        }
        .custom-controls .bottom-row .volume-container input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 12px; height: 12px;
            border-radius: 50%;
            background: #e50914;
            cursor: pointer;
            border: 2px solid #fff;
        }
        .custom-controls .bottom-row .fullscreen-btn { font-size: 18px; }
        
        .channel-bar {
            background: #1a1a2e;
            padding: 10px 15px;
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 10px;
            border-bottom: 1px solid #333;
        }
        .channel-bar select {
            flex: 1;
            min-width: 160px;
            padding: 8px 12px;
            background: #2a2a4a;
            color: #fff;
            border: 1px solid #444;
            border-radius: 6px;
            font-size: 13px;
            cursor: pointer;
            outline: none;
        }
        .channel-bar select:focus { border-color: #e50914; }
        .channel-bar button {
            padding: 8px 16px;
            background: #e50914;
            color: #fff;
            border: none;
            border-radius: 6px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .channel-bar button:hover { background: #ff0a1a; transform: scale(1.02); }
        .channel-bar button:disabled { opacity: 0.5; cursor: not-allowed; }
        .channel-bar .status {
            font-size: 12px;
            color: #aaa;
            margin-left: auto;
            white-space: nowrap;
        }
        .channel-bar .status .live {
            color: #e50914;
            font-weight: 700;
            animation: blink 1s infinite;
        }
        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.2; }
        }
        
        /* KATEGORİ BUTONLARI */
        .kategori-bar {
            background: #111;
            padding: 8px 15px;
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            border-bottom: 1px solid #222;
            overflow-x: auto;
        }
        .kategori-bar .kat-btn {
            padding: 4px 12px;
            background: #1a1a2e;
            color: #888;
            border: 1px solid #333;
            border-radius: 20px;
            font-size: 11px;
            cursor: pointer;
            transition: 0.2s;
            white-space: nowrap;
        }
        .kategori-bar .kat-btn:hover {
            background: #2a2a4a;
            color: #fff;
        }
        .kategori-bar .kat-btn.active {
            background: #e50914;
            color: #fff;
            border-color: #e50914;
        }
        
        .epg-container {
            background: #111;
            padding: 12px 15px;
            flex: 1;
            overflow-y: auto;
            max-height: 30vh;
            border-top: 1px solid #222;
        }
        .epg-container .epg-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
            border-bottom: 1px solid #333;
            padding-bottom: 8px;
        }
        .epg-container .epg-header h3 {
            color: #e50914;
            font-size: 15px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .epg-container .epg-header .epg-count {
            font-size: 11px;
            color: #666;
            font-weight: 400;
        }
        .epg-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 8px 10px;
            margin-bottom: 4px;
            background: #1a1a2e;
            border-radius: 6px;
            border-left: 3px solid #444;
            cursor: pointer;
            transition: 0.2s;
        }
        .epg-item:hover { background: #2a2a4a; transform: translateX(4px); }
        .epg-item.active { border-left-color: #e50914; background: #2a1a2e; }
        .epg-item img {
            width: 40px; height: 56px;
            object-fit: cover;
            border-radius: 4px;
            background: #222;
            flex-shrink: 0;
        }
        .epg-item .info {
            flex: 1;
            min-width: 0;
        }
        .epg-item .info .title {
            font-size: 13px;
            font-weight: 600;
            color: #fff;
        }
        .epg-item .info .desc {
            font-size: 11px;
            color: #999;
            margin-top: 1px;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
        .epg-item .info .time {
            font-size: 10px;
            color: #666;
            margin-top: 1px;
        }
        .epg-item .info .time .now { color: #4caf50; font-weight: 600; }
        .epg-item .play-btn {
            padding: 3px 10px;
            background: #e50914;
            color: #fff;
            border: none;
            border-radius: 4px;
            font-size: 10px;
            cursor: pointer;
            flex-shrink: 0;
            transition: 0.2s;
        }
        .epg-item .play-btn:hover { background: #ff0a1a; transform: scale(1.05); }
        .no-epg { color: #666; text-align: center; padding: 20px; font-size: 13px; }
        
        .loading-overlay {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: rgba(0,0,0,0.7);
            z-index: 5;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.4s;
        }
        .loading-overlay.show { opacity: 1; pointer-events: auto; }
        .loading-overlay .spinner {
            width: 50px; height: 50px;
            border: 4px solid #333;
            border-top-color: #e50914;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        .loading-overlay .loading-text { color: #aaa; font-size: 14px; margin-top: 12px; }
        @keyframes spin { to { transform: rotate(360deg); } }
        
        .error-overlay {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: rgba(0,0,0,0.8);
            z-index: 6;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.4s;
        }
        .error-overlay.show { opacity: 1; pointer-events: auto; }
        .error-overlay i { font-size: 48px; color: #e50914; }
        .error-overlay .error-text { color: #fff; font-size: 16px; margin-top: 12px; }
        .error-overlay .error-sub { color: #888; font-size: 12px; margin-top: 4px; }
        
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-track { background: #1a1a2e; }
        ::-webkit-scrollbar-thumb { background: #444; border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: #666; }
        
        @media (max-width: 600px) {
            .header h1 { font-size: 16px; }
            .header h1 i { font-size: 18px; }
            .header .info { font-size: 10px; gap: 8px; }
            .channel-bar select { font-size: 12px; padding: 6px 10px; min-width: 100px; }
            .channel-bar button { padding: 6px 12px; font-size: 12px; }
            .channel-bar .status { font-size: 10px; }
            .custom-controls { padding: 12px 10px 8px; }
            .custom-controls .bottom-row button { font-size: 16px; min-width: 28px; }
            .custom-controls .bottom-row button.play-btn { font-size: 22px; }
            .custom-controls .bottom-row .volume-container input[type="range"] { width: 40px; }
            .custom-controls .top-row .channel-name { font-size: 12px; max-width: 50%; }
            .epg-item { padding: 6px 8px; gap: 8px; }
            .epg-item img { width: 32px; height: 44px; }
            .epg-item .info .title { font-size: 12px; }
            .epg-item .info .desc { font-size: 10px; }
            .epg-container .epg-header h3 { font-size: 13px; }
            .player-wrapper { aspect-ratio: 16/9; max-height: 50vh; }
            .kategori-bar .kat-btn { font-size: 10px; padding: 3px 10px; }
        }
        @media (max-width: 400px) {
            .header h1 { font-size: 14px; }
            .header .info { font-size: 9px; gap: 4px; }
            .channel-bar select { font-size: 11px; padding: 4px 8px; min-width: 80px; }
            .channel-bar button { padding: 4px 10px; font-size: 11px; }
            .custom-controls .bottom-row button { font-size: 14px; min-width: 24px; }
            .custom-controls .bottom-row button.play-btn { font-size: 18px; }
            .custom-controls .bottom-row .volume-container input[type="range"] { width: 30px; }
        }
    </style>
</head>
<body>

    <div class="header">
        <h1><i class="fas fa-tv"></i> Mutlu TV</h1>
        <div class="info">
            <span class="dot"></span>
            <span id="channelCount">0</span> EPG kanal
            <span>•</span>
            <span id="totalCount">128</span> toplam kanal
            <span>•</span>
            <i class="far fa-clock"></i> <span id="updateTime">19.07.2026 22:08</span>
        </div>
    </div>

    <div class="player-wrapper" id="playerWrapper">
        <video id="video" playsinline></video>
        
        <div class="loading-overlay" id="loadingOverlay">
            <div class="spinner"></div>
            <div class="loading-text">Yayın bağlanıyor...</div>
        </div>
        
        <div class="error-overlay" id="errorOverlay">
            <i class="fas fa-exclamation-triangle"></i>
            <div class="error-text">Yayın hatası!</div>
            <div class="error-sub">Lütfen başka bir kanal deneyin</div>
        </div>

        <div class="custom-controls" id="customControls">
            <div class="top-row">
                <span class="channel-name" id="channelNameDisplay">Kanal Seçiniz</span>
                <span class="time-display" id="timeDisplay">00:00 / 00:00</span>
            </div>
            <div class="bottom-row">
                <button class="play-btn" id="playBtn" title="Oynat/Duraklat">
                    <i class="fas fa-play"></i>
                </button>
                
                <div class="progress-container">
                    <span class="time-label" id="currentTimeLabel">00:00</span>
                    <input type="range" id="progressBar" value="0" min="0" max="100" step="0.1">
                    <span class="time-label" id="durationLabel">00:00</span>
                </div>

                <div class="volume-container">
                    <button id="muteBtn" title="Ses">
                        <i class="fas fa-volume-up"></i>
                    </button>
                    <input type="range" id="volumeBar" value="100" min="0" max="100" step="1">
                </div>

                <button class="fullscreen-btn" id="fullscreenBtn" title="Tam Ekran">
                    <i class="fas fa-expand"></i>
                </button>
            </div>
        </div>
    </div>

    <div class="channel-bar">
        <select id="channelSelect">
            <option value="">📡 Kanal Seç</option>
        </select>
        <button id="reloadBtn"><i class="fas fa-sync-alt"></i> Yenile</button>
        <span class="status" id="statusText">⏳ Hazırlanıyor...</span>
    </div>

    <!-- KATEGORİ FİLTRE -->
    <div class="kategori-bar" id="kategoriBar">
        <button class="kat-btn active" data-kat="TÜMÜ">TÜMÜ (50)</button>
        <button class="kat-btn" data-kat="DİĞER">DİĞER (10)</button> <button class="kat-btn" data-kat="HABER">HABER (7)</button> <button class="kat-btn" data-kat="SPOR">SPOR (3)</button> <button class="kat-btn" data-kat="ULUSAL">ULUSAL (22)</button> <button class="kat-btn" data-kat="YEREL">YEREL (5)</button> <button class="kat-btn" data-kat="ÇOCUK">ÇOCUK (3)</button> 
    </div>

    <div class="epg-container" id="epgContainer">
        <div class="epg-header">
            <h3><i class="fas fa-list-ul"></i> Yayın Akışı</h3>
            <span class="epg-count" id="epgCount">0 program</span>
        </div>
        <div id="epgList">
            <div class="no-epg">📋 Kanal seçiniz.</div>
        </div>
    </div>

        // ============================================================

        // ============================================================
        async function loadChannel(channelId) {
            if (!channelId) return;
            
            const kanal = KANALLAR.find(k => k.id === channelId);
            if (!kanal) {
                statusText.textContent = '❌ Kanal bulunamadı!';
                return;
            }
            
            if (kanal.url) {
                currentChannel = { id: channelId, hlsUrl: kanal.url };
                channelNameDisplay.textContent = kanal.name;
                statusText.innerHTML = `🔴 <span class="live">CANLI</span> ${kanal.name}`;
                playVideo(kanal.url);
                fetchEpg(channelId);
                return;
            }
            
            showLoading(true);
            hideError();
            
            try {
                statusText.textContent = '⏳ Yayın bilgisi alınıyor...';
                const url = PLIST_BASE + channelId;
                const response = await fetch(url);
                const text = await response.text();
                const parser = new DOMParser();
                const xml = parser.parseFromString(text, 'text/xml');

                const strings = xml.querySelectorAll('string');
                let hlsUrl = null;
                for (const s of strings) {
                    const content = s.textContent || '';
                    if (content.includes('.m3u8')) {
                        hlsUrl = content;
                        break;
                    }
                }

                const epgItems = [];
                const dicts = xml.querySelectorAll('dict');
                for (const dict of dicts) {
                    let id = null, name = null, description = null, logoUrlHD = null, hls = null;
                    const children = dict.children;
                    for (let i = 0; i < children.length; i++) {
                        if (children[i].tagName === 'key') {
                            const key = children[i].textContent;
                            if (i + 1 < children.length && children[i + 1].tagName === 'string') {
                                const val = children[i + 1].textContent.trim();
                                if (key === 'id') id = val;
                                else if (key === 'name') name = val;
                                else if (key === 'description') description = val;
                                else if (key === 'logoUrlHD') logoUrlHD = val;
                                else if (key === 'HlsStreamURL') hls = val;
                            }
                        }
                    }
                    if (id && name && name !== 'LIVE' && name !== 'Live') {
                        epgItems.push({
                            id, name, description: description || '',
                            logo: logoUrlHD || '', hls: hls || '', isActive: false
                        });
                    }
                }

                if (epgItems.length > 0) {
                    epgItems[0].isActive = true;
                }

                epgData = epgItems;
                epgCount.textContent = `${epgItems.length} program`;
                renderEpg(epgItems);

                if (hlsUrl) {
                    currentChannel = { id: channelId, hlsUrl };
                    channelNameDisplay.textContent = kanal.name;
                    statusText.innerHTML = `🔴 <span class="live">CANLI</span> ${kanal.name}`;
                    playVideo(hlsUrl);
                } else {
                    statusText.textContent = '⚠️ Bu kanal için yayın linki bulunamadı.';
                    showError('Yayın linki bulunamadı');
                }

            } catch (e) {
                console.error(e);
                statusText.textContent = '❌ Kanal bilgisi alınamadı!';
                showError('Kanal bilgisi alınamadı');
            } finally {
                showLoading(false);
            }
        }

        // ============================================================

        async function fetchEpg(channelId) {
            try {
                const url = PLIST_BASE + channelId;
                const response = await fetch(url);
                const text = await response.text();
                const parser = new DOMParser();
                const xml = parser.parseFromString(text, 'text/xml');

                const epgItems = [];
                const dicts = xml.querySelectorAll('dict');
                for (const dict of dicts) {
                    let id = null, name = null, description = null, logoUrlHD = null, hls = null;
                    const children = dict.children;
                    for (let i = 0; i < children.length; i++) {
                        if (children[i].tagName === 'key') {
                            const key = children[i].textContent;
                            if (i + 1 < children.length && children[i + 1].tagName === 'string') {
                                const val = children[i + 1].textContent.trim();
                                if (key === 'id') id = val;
                                else if (key === 'name') name = val;
                                else if (key === 'description') description = val;
                                else if (key === 'logoUrlHD') logoUrlHD = val;
                                else if (key === 'HlsStreamURL') hls = val;
                            }
                        }
                    }
                    if (id && name && name !== 'LIVE' && name !== 'Live') {
                        epgItems.push({
                            id, name, description: description || '',
                            logo: logoUrlHD || '', hls: hls || '', isActive: false
                        });
                    }

                if (epgItems.length > 0) {

        // ============================================================
        // 5. VİDEO OYNATICI
        // ============================================================
        function playVideo(url) {
            if (hls) {
                hls.destroy();
                hls = null;
            }

            if (Hls.isSupported()) {
                hls = new Hls({
                    enableWorker: true,
                    lowLatencyMode: true,
                    maxBufferLength: 10,
                });
                hls.loadSource(url);
                hls.attachMedia(video);
                hls.on(Hls.Events.MANIFEST_PARSED, function() {
                    video.play().catch(e => console.log('Otomatik oynatma engellendi.'));
                    isPlaying = true;
                    updatePlayButton();
                });
                hls.on(Hls.Events.ERROR, function(event, data) {
                    if (data.fatal) {
                        console.error('HLS hatası:', data);
                        showError('Yayın hatası!');
                        statusText.textContent = '❌ Yayın hatası!';
                    }
                });
            } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
                video.src = url;
                video.play().catch(e => console.log('Otomatik oynatma engellendi.'));
                isPlaying = true;
                updatePlayButton();
            } else {
                statusText.textContent = '❌ Tarayıcınız HLS desteklemiyor.';
                showError('HLS desteklenmiyor');
            }
        }

        // ============================================================
        // 6. EPG
        // ============================================================
        function renderEpg(items) {
            if (!items || items.length === 0) {
                epgList.innerHTML = `<div class="no-epg">📋 EPG bilgisi bulunamadı.</div>`;
                return;
            }

            let html = '';
            items.forEach((item, index) => {
                const activeClass = item.isActive ? 'active' : '';
                const timeLabel = item.isActive ? '<span class="now">🔴 ŞİMDİ</span>' : '';
                html += `
                    <div class="epg-item ${activeClass}" data-index="${index}">
                        ${item.logo ? `<img src="${item.logo}" alt="${item.name}" onerror="this.style.display='none'">` : `<img src="" style="display:none">`}
                        <div class="info">
                            <div class="title">${item.name}</div>
                            <div class="desc">${item.description || 'Açıklama yok'}</div>
                            <div class="time">${timeLabel}</div>
                        </div>
                        ${item.hls ? `<button class="play-btn" data-hls="${item.hls}"><i class="fas fa-play"></i> Oynat</button>` : ''}
                    </div>
                `;
            });

            epgList.innerHTML = html;

            document.querySelectorAll('.epg-item .play-btn').forEach(btn => {
                btn.addEventListener('click', function(e) {
                    e.stopPropagation();
                    const url = this.dataset.hls;
                    if (url) {
                        playVideo(url);
                        const channelName = KANALLAR.find(k => k.id === currentChannel?.id)?.name || '';
                        statusText.textContent = `▶️ ${channelName} - VOD`;
                        document.querySelectorAll('.epg-item').forEach(el => el.classList.remove('active'));
                        this.closest('.epg-item').classList.add('active');
                        channelNameDisplay.textContent = `${channelName} - ${epgData[parseInt(this.closest('.epg-item').dataset.index)]?.name || ''}`;
                    }
                });
            });

            document.querySelectorAll('.epg-item').forEach(el => {
                el.addEventListener('click', function() {
                    const idx = parseInt(this.dataset.index);
                    const item = items[idx];
                    if (item && item.hls) {
                        playVideo(item.hls);
                        const channelName = KANALLAR.find(k => k.id === currentChannel?.id)?.name || '';
                        statusText.textContent = `▶️ ${channelName} - ${item.name}`;
                        document.querySelectorAll('.epg-item').forEach(e => e.classList.remove('active'));
                        this.classList.add('active');
                        channelNameDisplay.textContent = `${channelName} - ${item.name}`;
                    }
                });
            });
        }

        // ============================================================
        // 7. KONTROLLER
        // ============================================================
        function updatePlayButton() {
            const icon = playBtn.querySelector('i');

                isPlaying = false;
            } else {
                icon.className = 'fas fa-pause';

        }

        function updateProgress() {
            if (!isDragging) {
                const percent = (video.currentTime / video.duration) * 100;
                progressBar.value = percent || 0;
                currentTimeLabel.textContent = formatTime(video.currentTime);
                durationLabel.textContent = formatTime(video.duration);
                timeDisplay.textContent = `${formatTime(video.currentTime)} / ${formatTime(video.duration)}`;
            }
        }

        function formatTime(seconds) {
            if (!seconds || isNaN(seconds)) return '00:00';
            const s = Math.floor(seconds);
            const m = Math.floor(s / 60);
            const sec = s % 60;
            return `${String(m).padStart(2, '0')}:${String(sec).padStart(2, '0')}`;
        }

        function showLoading(show) {
            loadingOverlay.classList.toggle('show', show);
        }

        function showError(msg) {
            errorOverlay.classList.add('show');
            document.querySelector('.error-text').textContent = msg || 'Yayın hatası!';

        function hideError() {
            errorOverlay.classList.remove('show');

        function updateMuteIcon() {
            const icon = muteBtn.querySelector('i');
            if (video.muted || video.volume === 0) {

                icon.className = 'fas fa-volume-down';

            }

                renderEpg([]);
                statusText.textContent = '✅ Kanal seçiniz';
                channelNameDisplay.textContent = 'Kanal Seçiniz';
                epgCount.textContent = '0 program';
            }
        });

        reloadBtn.addEventListener('click', function() {
            const id = channelSelect.value;
            if (id) {
                loadChannel(id);
            }
        });

        playBtn.addEventListener('click', function() {
            if (video.paused) {
                video.play().catch(e => console.log('Oynatma hatası:', e));
            } else {
                video.pause();
            }
            updatePlayButton();
        });

        video.addEventListener('play', updatePlayButton);
        video.addEventListener('pause', updatePlayButton);
        video.addEventListener('timeupdate', updateProgress);
        video.addEventListener('loadedmetadata', updateProgress);
        video.addEventListener('waiting', () => showLoading(true));
        video.addEventListener('canplay', () => showLoading(false));
        video.addEventListener('error', () => {
            showError('Video hatası!');
            showLoading(false);
        });

        progressBar.addEventListener('input', function() {
            isDragging = true;
            const percent = parseFloat(this.value);
            const time = (percent / 100) * video.duration;
            currentTimeLabel.textContent = formatTime(time);
            timeDisplay.textContent = `${formatTime(time)} / ${formatTime(video.duration)}`;
        });
        progressBar.addEventListener('change', function() {
            isDragging = false;
            const percent = parseFloat(this.value);
            const time = (percent / 100) * video.duration;
            video.currentTime = time;
        });

        volumeBar.addEventListener('input', function() {
            const vol = parseFloat(this.value) / 100;
            video.volume = vol;
            updateMuteIcon();
        });

        muteBtn.addEventListener('click', function() {
            video.muted = !video.muted;
            updateMuteIcon();
        });

        fullscreenBtn.addEventListener('click', function() {
            if (!document.fullscreenElement) {
                playerWrapper.requestFullscreen?.() || 
                playerWrapper.webkitRequestFullscreen?.();
            } else {
                document.exitFullscreen?.() || 
                document.webkitExitFullscreen?.();
            }
        });

        let controlsTimeout;
        playerWrapper.addEventListener('mousemove', function() {
            playerWrapper.classList.add('show-controls');
            clearTimeout(controlsTimeout);
            controlsTimeout = setTimeout(() => {
                if (!video.paused) {
                    playerWrapper.classList.remove('show-controls');
                }
            }, 3000);
        });
        playerWrapper.addEventListener('mouseleave', function() {
            if (!video.paused) {
                playerWrapper.classList.remove('show-controls');
            }
        });
        playerWrapper.addEventListener('touchstart', function() {
            playerWrapper.classList.toggle('show-controls');
        });

        document.addEventListener('keydown', function(e) {
            if (e.target.tagName === 'SELECT') return;
            if (e.code === 'Space') {
                e.preventDefault();
                playBtn.click();
            }
            if (e.code === 'ArrowRight') {
                video.currentTime = Math.min(video.currentTime + 10, video.duration);
            }
            if (e.code === 'ArrowLeft') {
                video.currentTime = Math.max(video.currentTime - 10, 0);
            }
            if (e.code === 'KeyF') {
                fullscreenBtn.click();
            }
        });

        // ============================================================
        // 9. BAŞLAT
        // ============================================================
        populateChannels();
        console.log('📺 Mutlu TV başlatıldı!');
        console.log(`📡 ${KANALLAR.length} EPG kanalı hazır.`);
        console.log(`📊 Kategoriler: ${KATEGORILER.join(', ')}`);
    </script>

</body>
</html>
